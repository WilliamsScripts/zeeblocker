<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeeBlocker</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>🎯 ZeeBlocker</h1>
        <div class="header-controls">
          <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">
            <span class="theme-icon">🌙</span>
          </button>
          <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
        </div>
      </div>
    </header>

    <!-- Focus Mode Section -->
    <section class="focus-section">
      <div class="focus-header">
        <h2>Focus Mode</h2>
        <div class="toggle-container">
          <label class="toggle-switch">
            <input type="checkbox" id="focusModeToggle">
            <span class="toggle-slider"></span>
          </label>
          <span id="focusStatus" class="status-text">Off</span>
        </div>
      </div>
      <p class="focus-description">Block distracting websites to stay productive</p>
    </section>

    <!-- Task List Section -->
    <section class="tasks-section">
      <div class="section-header">
        <h2>Tasks & Time Slots</h2>
        <button id="addTaskBtn" class="btn-primary">+ Add Task</button>
      </div>
      
      <div id="taskList" class="task-list"></div>
      
      <!-- Add Task Form -->
      <div id="addTaskForm" class="add-task-form hidden">
        <input type="text" id="taskTitle" placeholder="Task title" class="input-field">
        <div class="time-inputs">
          <input type="time" id="taskStartTime" class="input-field">
          <span>to</span>
          <input type="time" id="taskEndTime" class="input-field">
        </div>
        <textarea id="taskDescription" placeholder="Description (optional)" class="input-field"></textarea>
        <div class="form-actions">
          <button id="saveTaskBtn" class="btn-primary">Save</button>
          <button id="cancelTaskBtn" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </section>

    <!-- Quick Stats -->
    <section class="stats-section">
      <div class="stat-card">
        <div class="stat-value" id="blockedToday">0</div>
        <div class="stat-label">Blocked Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="focusTime">0h</div>
        <div class="stat-label">Focus Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="tasksCompleted">0</div>
        <div class="stat-label">Tasks Done</div>
      </div>
    </section>

    <!-- Quick Actions -->
    <section class="quick-actions">
      <button id="manageBlocklistBtn" class="action-btn">
        🚫 Manage Blocklist
      </button>
      <button id="integrationsBtn" class="action-btn">
        🔗 Integrations
      </button>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
