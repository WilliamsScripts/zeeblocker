<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked - ZeeBlocker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.4s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }
    
    h1 {
      color: #2d3748;
      font-size: 32px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    .site-name {
      color: #667eea;
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: 600;
      word-break: break-all;
    }
    
    .message {
      color: #718096;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .reason-badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 30px;
    }
    
    .reason-focus {
      background: #fed7d7;
      color: #c53030;
    }
    
    .reason-child-safety {
      background: #feebc8;
      color: #c05621;
    }
    
    .reason-organization {
      background: #bee3f8;
      color: #2c5282;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }
    
    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #edf2f7;
      color: #2d3748;
    }
    
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    
    .timer {
      margin-top: 30px;
      padding: 20px;
      background: #f7fafc;
      border-radius: 12px;
      display: none;
    }
    
    .timer.visible {
      display: block;
    }
    
    .timer-text {
      color: #718096;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .timer-value {
      color: #667eea;
      font-size: 36px;
      font-weight: 700;
    }
    
    .warning {
      margin-top: 20px;
      padding: 16px;
      background: #fff5f5;
      border-left: 4px solid #f56565;
      border-radius: 8px;
      text-align: left;
    }
    
    .warning-title {
      color: #c53030;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 16px;
    }
    
    .warning-text {
      color: #742a2a;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" id="icon">🚫</div>
    <h1>Site Blocked</h1>
    <div class="site-name" id="siteName"></div>
    
    <div class="reason-badge" id="reasonBadge"></div>
    
    <div class="message" id="message"></div>
    
    <div class="actions">
      <button class="btn btn-primary" id="goBackBtn">← Go Back</button>
      <button class="btn btn-secondary" id="settingsBtn">Open Settings</button>
    </div>
    
    <div class="timer" id="timer">
      <div class="timer-text">Time saved today:</div>
      <div class="timer-value" id="timerValue">0:00</div>
    </div>
    
    <div class="warning" id="parentWarning" style="display: none;">
      <div class="warning-title">⚠️ Parent Notification Sent</div>
      <div class="warning-text">
        Your parent/guardian has been notified of this access attempt.
      </div>
    </div>
    
    <div class="warning" id="orgWarning" style="display: none;">
      <div class="warning-title">⚠️ Organization Policy</div>
      <div class="warning-text">
        This site is blocked by your organization's policy. Repeated attempts may be logged.
      </div>
    </div>
  </div>
  
  <script src="blocked.js"></script>
</body>
</html>
