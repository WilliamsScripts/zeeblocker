<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked - ZeeBlocker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef2ff;
      color: #4f46e5;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .icon-wrap svg {
      width: 44px;
      height: 44px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    h1 {
      color: #1e1b2e;
      font-size: 30px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .site-name {
      color: #4f46e5;
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: 600;
      word-break: break-all;
    }

    .message {
      color: #64748b;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .reason-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .reason-badge svg {
      width: 16px;
      height: 16px;
    }

    .reason-focus {
      background: #eef2ff;
      color: #4f46e5;
    }

    .reason-child-safety {
      background: #fffbeb;
      color: #b45309;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #1e1b2e;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .timer {
      margin-top: 30px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      display: none;
    }

    .timer.visible {
      display: block;
    }

    .timer-text {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .timer-value {
      color: #4f46e5;
      font-size: 36px;
      font-weight: 700;
    }

    .warning {
      margin-top: 20px;
      padding: 16px;
      background: #fff5f5;
      border-left: 4px solid #f56565;
      border-radius: 8px;
      text-align: left;
      display: flex;
      gap: 10px;
    }

    .warning svg {
      width: 20px;
      height: 20px;
      color: #c53030;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .warning-title {
      color: #c53030;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .warning-text {
      color: #742a2a;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap" id="icon"></div>
    <h1>Site Blocked</h1>
    <div class="site-name" id="siteName"></div>

    <div class="reason-badge" id="reasonBadge"></div>

    <div class="message" id="message"></div>

    <div class="actions">
      <button class="btn btn-primary" id="goBackBtn"></button>
      <button class="btn btn-secondary" id="settingsBtn">Open Settings</button>
    </div>

    <div class="timer" id="timer">
      <div class="timer-text">Total focus time:</div>
      <div class="timer-value" id="timerValue">0:00</div>
    </div>

    <div class="warning" id="parentWarning" style="display: none;"></div>
  </div>

  <script src="icons.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
